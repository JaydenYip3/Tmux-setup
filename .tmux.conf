unbind r
bind r source-file ~/.tmux.confind r source-file ~/.tmux.conf

# Vim-style pane navigation
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Resize panes with vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Enable mouse support
set -g mouse on

# Better colors
set -g default-terminal "tmux-256color"

# Start window numbering at 1
set -g base-index 1

# Auto focus
set -g focus-events on

# Start pane numbering at 1
set -g pane-base-index 1

#linked with symlink @code repo

# Disable auto-copy on mouse drag release — use Cmd+C to copy manually
bind -T copy-mode-vi MouseDragEnd1Pane send -X stop-selection
bind -T copy-mode MouseDragEnd1Pane send -X stop-selection
set -s set-clipboard off

# Swap windows 
bind-key -n C-S-h swap-window -t -1
bind-key -n C-S-l swap-window -t +1
